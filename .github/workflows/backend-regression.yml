name: Backend Regression

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run stable backend regression suite
        shell: bash
        run: |
          ./mvnw -B "-Dtest=RegressionStableSuite" test

      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-reports
          path: |
            target/surefire-reports/**
