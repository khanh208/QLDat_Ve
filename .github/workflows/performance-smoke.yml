name: Performance Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run booking performance smoke tests
        shell: bash
        run: |
          ./mvnw -B "-Dtest=BookingPerformanceSmokeTest" test

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-reports
          path: |
            target/performance-reports/**
            target/surefire-reports/**
