name: Selenium E2E

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  selenium-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: qldatve-frontend/package-lock.json

      - name: Install Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1

      - name: Install frontend dependencies
        working-directory: qldatve-frontend
        run: npm ci

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Start mock API server
        shell: bash
        run: |
          nohup node tests/e2e/mock-api-server.js > mock-api.log 2>&1 &

      - name: Start React frontend
        working-directory: qldatve-frontend
        shell: bash
        env:
          CI: "true"
          BROWSER: "none"
          HOST: "127.0.0.1"
          PORT: "3000"
          REACT_APP_API_BASE_URL: "http://127.0.0.1:8081/api"
        run: |
          nohup npm start > ../frontend.log 2>&1 &

      - name: Wait for mock API and frontend
        shell: bash
        run: |
          set -euo pipefail

          for i in {1..60}; do
            curl -fsS http://127.0.0.1:8081/api/trips > /dev/null && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:8081/api/trips > /dev/null

          for i in {1..60}; do
            curl -fsS http://127.0.0.1:3000 > /dev/null && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000 > /dev/null

      - name: Run Selenium smoke tests
        run: ./mvnw -B -Dtest=FrontendSeleniumSmokeTest -Dselenium.browser=${{ matrix.browser }} -Dselenium.baseUrl=http://127.0.0.1:3000 test

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-logs-${{ matrix.browser }}
          path: |
            frontend.log
            mock-api.log
            target/surefire-reports/**
